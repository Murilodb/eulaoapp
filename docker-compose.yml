# Gendei Database Configuration
# After starting: npx prisma migrate dev && npx prisma db seed
services:

  db:
    image: postgres:15-alpine
    container_name: gendei-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gendei
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
